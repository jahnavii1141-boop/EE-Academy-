<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EE Dump — The Extended Essay Academy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa; --surface: #ffffff; --text: #111; --text-2: #444;
    --text-3: #888; --text-4: #bbb; --border: #eee; --border-2: #e0e0e0;
    --accent: #111; --accent-soft: #f5f5f5;
    --blue: #2563eb; --blue-bg: #f0f4ff;
    --green: #16a34a; --green-bg: #f0fdf4;
    --orange: #ea580c; --orange-bg: #fff7ed;
    --purple: #7c3aed; --purple-bg: #faf5ff;
    --rose: #e11d48;
    --r: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', -apple-system, sans-serif; font-size: 15px; line-height: 1.65; -webkit-font-smoothing: antialiased; }
  ::selection { background: #dbeafe; }
  .page { max-width: 720px; margin: 0 auto; padding: 48px 24px 120px; }
  .hero { margin-bottom: 48px; }
  .hero-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; }
  .hero h1 { font-family: 'Instrument Serif', serif; font-size: 44px; font-weight: 400; color: var(--text); line-height: 1.15; margin-bottom: 12px; }
  .hero p { font-size: 16px; color: var(--text-2); max-width: 480px; }
  .rq { border-bottom: 1px solid var(--border); padding-bottom: 32px; margin-bottom: 40px; }
  .rq-label { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-4); margin-bottom: 10px; }
  .rq-input { width: 100%; background: none; border: none; outline: none; font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: 400; color: var(--text); line-height: 1.4; }
  .rq-input::placeholder { color: var(--text-4); }
  .counters { display: flex; gap: 32px; margin-bottom: 40px; padding: 20px 0; border-bottom: 1px solid var(--border); }
  .counter-val { font-family: 'Instrument Serif', serif; font-size: 32px; color: var(--text); transition: all 0.3s ease; }
  .counter-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-4); }
  .subtopic { margin-bottom: 32px; }
  .subtopic-head { display: flex; align-items: center; gap: 14px; padding: 8px 0; margin-bottom: 16px; border-bottom: 2px solid var(--text); }
  .subtopic-idx { font-family: 'Instrument Serif', serif; font-size: 28px; color: var(--text-3); min-width: 32px; }
  .subtopic-name { flex: 1; border: none; outline: none; background: none; font-size: 18px; font-weight: 600; color: var(--text); font-family: inherit; }
  .subtopic-name::placeholder { color: var(--text-4); font-weight: 400; }
  .subtopic-remove { background: none; border: none; color: var(--text-4); cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 6px; opacity: 0; transition: all 0.2s; }
  .subtopic-head:hover .subtopic-remove { opacity: 1; }
  .subtopic-remove:hover { color: var(--rose); background: #fef2f2; }
  .entry { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 12px; transition: border-color 0.2s, box-shadow 0.2s; overflow: hidden; }
  .entry:hover { border-color: var(--border-2); }
  .entry:focus-within { border-color: var(--text); box-shadow: 0 0 0 1px var(--text); }
  .entry-content { width: 100%; border: none; outline: none; background: none; padding: 20px 24px 12px; font-size: 14px; font-family: inherit; color: var(--text); line-height: 1.7; resize: none; min-height: 72px; field-sizing: content; }
  .entry-content::placeholder { color: var(--text-4); }
  .entry-note { width: 100%; border: none; outline: none; background: none; padding: 0 24px 16px; font-size: 13px; font-family: inherit; color: var(--text-3); font-style: italic; }
  .entry-note::placeholder { color: var(--text-4); font-style: italic; }
  .entry-source { border-top: 1px solid var(--border); padding: 0; transition: all 0.25s ease; }
  .source-collapsed { padding: 12px 24px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.15s; }
  .source-collapsed:hover { background: var(--accent-soft); }
  .source-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--text-4); transition: background 0.2s; }
  .source-dot.cited { background: var(--green); }
  .source-collapsed-text { font-size: 12px; color: var(--text-3); flex: 1; }
  .source-collapsed-text.has-cite { color: var(--green); font-weight: 500; }
  .source-remove { background: none; border: none; color: var(--text-4); cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 4px; opacity: 0; transition: opacity 0.15s; }
  .entry:hover .source-remove { opacity: 1; }
  .source-remove:hover { color: var(--rose); }
  .source-expanded { display: none; padding: 16px 24px 20px; border-top: 1px solid var(--border); background: var(--accent-soft); }
  .source-expanded.open { display: block; }
  .source-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .source-full { grid-column: 1 / -1; }
  .sf { display: flex; flex-direction: column; gap: 4px; }
  .sf label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-4); }
  .sf input, .sf select { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--surface); outline: none; transition: border-color 0.15s; }
  .sf input:focus, .sf select:focus { border-color: var(--text); }
  .sf input::placeholder { color: var(--text-4); }
  .cite-preview-box { margin-top: 16px; padding: 14px 16px; background: var(--green-bg); border-radius: 10px; font-size: 12px; color: var(--text-2); line-height: 1.7; display: none; }
  .cite-preview-box.visible { display: block; }
  .cite-preview-box em { font-style: italic; }
  .cite-preview-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--green); margin-bottom: 6px; }
  .add-entry { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 14px; border-radius: var(--r); margin-top: 8px; margin-bottom: 8px; border: 1px dashed var(--border); background: none; color: var(--text-3); font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; transition: all 0.2s; width: 100%; }
  .add-entry:hover { border-color: var(--text); color: var(--text); background: var(--accent-soft); }
  .add-topic { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 18px; border-radius: var(--r); border: 1px dashed var(--border-2); background: var(--surface); color: var(--text-2); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s; width: 100%; margin-bottom: 48px; }
  .add-topic:hover { border-color: var(--text); color: var(--text); }
  .bib-section { border-top: 1px solid var(--border); padding-top: 40px; margin-top: 20px; }
  .bib-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .bib-head h2 { font-family: 'Instrument Serif', serif; font-size: 28px; font-weight: 400; }
  .bib-copy { padding: 8px 18px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-2); font-family: inherit; background: var(--surface); color: var(--text-2); transition: all 0.15s; }
  .bib-copy:hover { border-color: var(--text); color: var(--text); }
  .bib-empty { font-size: 14px; color: var(--text-4); font-style: italic; }
  .bib-entry { font-size: 14px; color: var(--text-2); line-height: 1.8; padding: 12px 0; border-bottom: 1px solid var(--border); padding-left: 36px; text-indent: -36px; }
  .bib-entry:last-child { border-bottom: none; }
  .bib-count { font-size: 13px; color: var(--text-3); font-weight: 400; margin-left: 12px; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .animate { animation: slideIn 0.3s ease forwards; }
  @media (max-width: 600px) { .hero h1 { font-size: 32px; } .counters { gap: 20px; } .counter-val { font-size: 26px; } .source-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div class="hero-eyebrow">Module 5 — Free Tool</div>
    <h1>EE Dump</h1>
    <p>Your research workspace. Dump everything, cite as you go, and your bibliography writes itself.</p>
  </div>
  <div class="rq">
    <div class="rq-label">Research Question</div>
    <input class="rq-input" id="rqInput" placeholder="Type your research question...">
  </div>
  <div class="counters">
    <div class="counter"><div class="counter-val" id="cTopics">0</div><div class="counter-label">Topics</div></div>
    <div class="counter"><div class="counter-val" id="cEntries">0</div><div class="counter-label">Entries</div></div>
    <div class="counter"><div class="counter-val" id="cWords">0</div><div class="counter-label">Words</div></div>
    <div class="counter"><div class="counter-val" id="cSources">0</div><div class="counter-label">Cited</div></div>
  </div>
  <div id="topics"></div>
  <button class="add-topic" onclick="addTopic()">+ New sub-topic</button>
  <div class="bib-section" id="bibSection">
    <div class="bib-head">
      <h2>Bibliography<span class="bib-count" id="bibCount"></span></h2>
      <button class="bib-copy" onclick="copyBib()">Copy all</button>
    </div>
    <div id="bibList"><p class="bib-empty">Your bibliography will build here as you cite sources above.</p></div>
  </div>
</div>
<script>
let D = { rq:'', topics:[] };
const MO = ['Jan.','Feb.','Mar.','Apr.','May','June','July','Aug.','Sept.','Oct.','Nov.','Dec.'];
function addTopic() {
  D.topics.push({ name:'', entries:[] });
  render();
  const ts = document.querySelectorAll('.subtopic');
  const last = ts[ts.length-1];
  if (last) last.querySelector('.subtopic-name').focus();
}
function rmTopic(i) {
  if (D.topics[i].entries.length && !confirm('Delete this sub-topic?')) return;
  D.topics.splice(i,1); render();
}
function addEntry(ti) {
  D.topics[ti].entries.push({ content:'', note:'', c:{ type:'website',author:'',title:'',site:'',url:'',year:'',accessed:new Date().toISOString().split('T')[0] }});
  render();
  const cards = document.querySelectorAll('.subtopic');
  const entries = cards[ti]?.querySelectorAll('.entry-content');
  if (entries?.length) entries[entries.length-1].focus();
}
function rmEntry(ti,ei) { D.topics[ti].entries.splice(ei,1); render(); }
function sync() {
  D.rq = document.getElementById('rqInput').value;
  document.querySelectorAll('.subtopic').forEach((t,ti) => {
    if (!D.topics[ti]) return;
    D.topics[ti].name = t.querySelector('.subtopic-name').value;
    t.querySelectorAll('.entry').forEach((e,ei) => {
      if (!D.topics[ti].entries[ei]) return;
      const d = D.topics[ti].entries[ei];
      d.content = e.querySelector('.entry-content').value;
      d.note = e.querySelector('.entry-note').value;
      const f = e.querySelector('.source-expanded');
      if (f) {
        d.c.type = f.querySelector('[data-f="type"]')?.value||'website';
        d.c.author = f.querySelector('[data-f="author"]')?.value||'';
        d.c.title = f.querySelector('[data-f="title"]')?.value||'';
        d.c.site = f.querySelector('[data-f="site"]')?.value||'';
        d.c.url = f.querySelector('[data-f="url"]')?.value||'';
        d.c.year = f.querySelector('[data-f="year"]')?.value||'';
        d.c.accessed = f.querySelector('[data-f="accessed"]')?.value||'';
      }
    });
  });
  updateCounters();
  updateBib();
}
function mla(c) {
  if (!c.author && !c.title) return '';
  let p = [];
  if (c.author) { const w=c.author.split(' '); p.push(w.length>=2 ? w[w.length-1]+', '+w.slice(0,-1).join(' ')+'.' : c.author+'.'); }
  if (c.title) p.push(c.type==='book' ? '<em>'+c.title+'</em>.' : '\u201c'+c.title+'.\u201d');
  if (c.site) p.push('<em>'+c.site+'</em>,');
  if (c.year) p.push(c.year+(c.url?',':'.'));
  if (c.url) p.push(c.url+'.');
  if (c.accessed) { const d=new Date(c.accessed); if(!isNaN(d)) p.push('Accessed '+d.getDate()+' '+MO[d.getMonth()]+' '+d.getFullYear()+'.'); }
  return p.join(' ');
}
function updateCounters() {
  let ent=0, w=0, src=0;
  D.topics.forEach(t => { ent+=t.entries.length; t.entries.forEach(e => { if(e.content.trim()) w+=e.content.trim().split(/\s+/).length; if(e.c.author||e.c.title) src++; }); });
  document.getElementById('cTopics').textContent = D.topics.length;
  document.getElementById('cEntries').textContent = ent;
  document.getElementById('cWords').textContent = w.toLocaleString();
  document.getElementById('cSources').textContent = src;
}
function updateBib() {
  const cites = [];
  D.topics.forEach(t => t.entries.forEach(e => { const m=mla(e.c); if(m) cites.push(m); }));
  cites.sort((a,b) => a.replace(/<[^>]+>/g,'').localeCompare(b.replace(/<[^>]+>/g,'')));
  const el = document.getElementById('bibList');
  const ct = document.getElementById('bibCount');
  ct.textContent = cites.length ? ' — '+cites.length+' source'+(cites.length===1?'':'s') : '';
  if (!cites.length) el.innerHTML = '<p class="bib-empty">Your bibliography will build here as you cite sources above.</p>';
  else el.innerHTML = cites.map(c => '<div class="bib-entry">'+c+'</div>').join('');
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function render() {
  sync();
  const container = document.getElementById('topics');
  const openSources = [];
  document.querySelectorAll('.source-expanded').forEach(s => openSources.push(s.classList.contains('open')));
  container.innerHTML = '';
  let srcIdx = 0;
  D.topics.forEach((topic, ti) => {
    const div = document.createElement('div');
    div.className = 'subtopic animate';
    div.innerHTML = `
      <div class="subtopic-head">
        <div class="subtopic-idx">${ti+1}</div>
        <input class="subtopic-name" placeholder="Sub-topic name" value="${esc(topic.name)}" oninput="sync()">
        <button class="subtopic-remove" onclick="rmTopic(${ti})" title="Remove">✕</button>
      </div>
      ${topic.entries.map((ent, ei) => {
        const m = mla(ent.c);
        const hasCite = !!m;
        const wasOpen = openSources[srcIdx] || false;
        srcIdx++;
        return `<div class="entry">
          <textarea class="entry-content" placeholder="Paste your research here..." oninput="autoGrow(this);sync()">${esc(ent.content)}</textarea>
          <input class="entry-note" placeholder="Why does this matter? What's the connection?" value="${esc(ent.note)}" oninput="sync()">
          <div class="entry-source">
            <div class="source-collapsed" onclick="toggleSource(this)">
              <div class="source-dot${hasCite?' cited':''}"></div>
              <span class="source-collapsed-text${hasCite?' has-cite':''}">${hasCite ? 'Source cited — '+esc(ent.c.author||ent.c.title) : 'Add source'}</span>
              <button class="source-remove" onclick="event.stopPropagation();rmEntry(${ti},${ei})">✕</button>
            </div>
            <div class="source-expanded${wasOpen?' open':''}">
              <div class="source-grid">
                <div class="sf"><label>Type</label><select data-f="type" onchange="sync()"><option value="website"${ent.c.type==='website'?' selected':''}>Website</option><option value="journal"${ent.c.type==='journal'?' selected':''}>Journal</option><option value="book"${ent.c.type==='book'?' selected':''}>Book</option><option value="report"${ent.c.type==='report'?' selected':''}>Report</option><option value="video"${ent.c.type==='video'?' selected':''}>Video</option></select></div>
                <div class="sf"><label>Author</label><input data-f="author" placeholder="Full name" value="${esc(ent.c.author)}" oninput="sync()"></div>
                <div class="sf source-full"><label>Title</label><input data-f="title" placeholder="Title of article, page, or book" value="${esc(ent.c.title)}" oninput="sync()"></div>
                <div class="sf"><label>Website / Publisher</label><input data-f="site" placeholder="e.g. BBC, Investopedia" value="${esc(ent.c.site)}" oninput="sync()"></div>
                <div class="sf"><label>Year</label><input data-f="year" placeholder="2024" value="${esc(ent.c.year)}" oninput="sync()"></div>
                <div class="sf source-full"><label>URL</label><input data-f="url" placeholder="https://..." value="${esc(ent.c.url)}" oninput="sync()"></div>
                <div class="sf"><label>Date accessed</label><input type="date" data-f="accessed" value="${esc(ent.c.accessed)}" oninput="sync()"></div>
              </div>
              <div class="cite-preview-box${m?' visible':''}">
                <div class="cite-preview-label">MLA Citation</div>
                ${m}
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
      <button class="add-entry" onclick="addEntry(${ti})">+ Add entry</button>
    `;
    container.appendChild(div);
  });
  document.querySelectorAll('.entry-content').forEach(autoGrow);
  updateCounters();
  updateBib();
}
function toggleSource(el) { el.nextElementSibling.classList.toggle('open'); }
function autoGrow(el) {
  if (el.target) el = el.target;
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}
function copyBib() {
  const cites = [];
  D.topics.forEach(t => t.entries.forEach(e => { const m=mla(e.c).replace(/<\/?em>/g,''); if(m) cites.push(m); }));
  cites.sort();
  navigator.clipboard.writeText(cites.join('\n\n')).then(() => {
    const btn = document.querySelector('.bib-copy');
    btn.textContent = 'Copied ✓'; setTimeout(()=>btn.textContent='Copy all',2000);
  });
}
addTopic();
</script>
</body>
</html>
